# Сборка установщика и публикация в GitHub Release при пуше тега v* (например v0.1.0, v0.1.1).
# Как выкатить патч: поднять version в package.json → commit → git tag v0.1.1 → git push origin v0.1.1

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # Строим без publish — electron-builder генерирует .exe и latest.yml в ./release/
      - run: npm run electron:build -- --publish never

      # Создаём GitHub Release и заливаем installer + latest.yml (нужен electron-updater)
      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ -f "RELEASE_NOTES.md" ]; then
            NOTES=$(cat RELEASE_NOTES.md)
          else
            NOTES="Release $TAG"
          fi
          gh release create "$TAG" \
            --title "Grindly $TAG" \
            --notes "$NOTES" \
            release/*.exe \
            release/latest.yml
