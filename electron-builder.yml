appId: com.grindly.app
productName: Grindly
directories:
  output: release
files:
  - dist/**/*
  - package.json
  - node_modules/**/*
extraResources:
  - from: assets/icon.png
    to: assets/icon.png
  - from: assets/icon.ico
    to: assets/icon.ico
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: "Grindly-Setup-${version}.exe"
mac:
  icon: assets/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false
  extraResources:
    - from: dist/macos-tracker
      to: macos-tracker
dmg:
  title: "Grindly ${version}"
  artifactName: "Grindly-${version}.dmg"
forceCodeSigning: false
publish:
  provider: github
  owner: borissharikoff-droid
  repo: Idly
